<div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
    <div class="panel rounded-lg p-6">
        <p class="text-muted text-sm mb-1">Active Projects</p>
        <p class="text-4xl font-bold accent-teal">{{ active_count }}</p>
    </div>
    <div class="panel rounded-lg p-6">
        <p class="text-muted text-sm mb-1">Completed</p>
        <p class="text-4xl font-bold text-green-400">{{ complete_count }}</p>
    </div>
    <div class="panel rounded-lg p-6">
        <p class="text-muted text-sm mb-1">Profiles</p>
        <p class="text-4xl font-bold accent-gold">{{ profile_count }}</p>
    </div>
    <div class="panel rounded-lg p-6">
        <p class="text-muted text-sm mb-1">Est. Cost Today</p>
        <p class="text-4xl font-bold accent-purple">${{ "%.2f"|format(cost_today) }}</p>
    </div>
</div>
