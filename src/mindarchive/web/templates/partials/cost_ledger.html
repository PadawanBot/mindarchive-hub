{% if entries %}
<div class="overflow-x-auto">
    <table class="w-full text-sm">
        <thead>
            <tr class="text-muted text-left border-b border-gray-700">
                <th class="pb-2 pr-4">Service</th>
                <th class="pb-2 pr-4">Operation</th>
                <th class="pb-2 pr-4">Project</th>
                <th class="pb-2 pr-4">Cost</th>
                <th class="pb-2 pr-4">Units</th>
                <th class="pb-2">Time</th>
            </tr>
        </thead>
        <tbody>
            {% for e in entries %}
            <tr class="border-b border-gray-800">
                <td class="py-2 pr-4 font-medium">{{ e.service }}</td>
                <td class="py-2 pr-4 text-muted">{{ e.operation }}</td>
                <td class="py-2 pr-4 text-muted">{{ e.project_slug or '-' }}</td>
                <td class="py-2 pr-4 accent-teal">${{ "%.4f"|format(e.cost) }}</td>
                <td class="py-2 pr-4 text-muted text-xs">{{ e.units or '-' }} {{ e.unit_type or '' }}</td>
                <td class="py-2 text-muted text-xs">{{ e.created_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
<p class="text-muted">No charges recorded yet.</p>
{% endif %}
