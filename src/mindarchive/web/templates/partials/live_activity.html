{% if running_projects %}
{% for proj in running_projects %}
<div class="panel-mid rounded-lg p-4 mb-3">
    <div class="flex items-center justify-between mb-2">
        <div>
            <span class="font-medium">{{ proj.title or proj.slug }}</span>
            <span class="badge badge-running ml-2">running</span>
        </div>
        <span class="text-muted text-xs">Step {{ proj.current_step or '?' }}/15</span>
    </div>
    <div class="progress-bar mb-2">
        <div class="progress-fill" style="width: {{ ((proj.current_step or 0) / 15 * 100)|int }}%"></div>
    </div>
    <!-- Step timeline -->
    <div class="flex gap-1 overflow-x-auto py-1">
        {% for step_num in range(1, 16) %}
        <div class="step-dot
            {% if proj.step_statuses and step_num in proj.step_statuses %}
                {% if proj.step_statuses[step_num] == 'complete' %}step-dot-complete
                {% elif proj.step_statuses[step_num] == 'running' %}step-dot-running
                {% elif proj.step_statuses[step_num] == 'error' %}step-dot-error
                {% elif proj.step_statuses[step_num] == 'skipped' %}step-dot-skipped
                {% else %}step-dot-pending{% endif %}
            {% elif step_num == proj.current_step %}step-dot-running
            {% elif step_num < (proj.current_step or 0) %}step-dot-complete
            {% else %}step-dot-pending{% endif %}"
            title="Step {{ step_num }}">
            {{ step_num }}
        </div>
        {% endfor %}
    </div>
</div>
{% endfor %}
{% else %}
<p class="text-muted">No active pipelines. Start one from the CLI or project page.</p>
{% endif %}
