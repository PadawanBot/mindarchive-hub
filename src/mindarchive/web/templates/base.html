<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindArchive{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <style>
        body { background-color: #0f0f1a; color: #f0f0f4; }
        .panel { background-color: #1a1a2e; border: 1px solid #2e2e50; }
        .panel-mid { background-color: #1e1e32; }
        .text-muted { color: #8892a4; }
        .accent-teal { color: #1abc9c; }
        .accent-gold { color: #f1c40f; }
        .accent-red { color: #c0392b; }
        .accent-purple { color: #9b59b6; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="panel border-b border-gray-700 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="/" class="text-xl font-bold accent-teal">MindArchive</a>
            <a href="/" class="text-muted hover:text-white">Dashboard</a>
            <a href="/profiles" class="text-muted hover:text-white">Profiles</a>
            <a href="/formats" class="text-muted hover:text-white">Formats</a>
        </div>
        <span class="text-muted text-sm">v{{ version }}</span>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
