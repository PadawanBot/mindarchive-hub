<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MindArchive{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.0/sse.js"></script>
    <style>
        body { background-color: #0f0f1a; color: #f0f0f4; }
        .panel { background-color: #1a1a2e; border: 1px solid #2e2e50; }
        .panel-mid { background-color: #1e1e32; }
        .panel-hover:hover { background-color: #22223a; border-color: #3e3e60; }
        .text-muted { color: #8892a4; }
        .accent-teal { color: #1abc9c; }
        .accent-gold { color: #f1c40f; }
        .accent-red { color: #c0392b; }
        .accent-purple { color: #9b59b6; }
        .bg-accent-teal { background-color: #1abc9c; }
        .bg-accent-gold { background-color: #f1c40f; }
        .bg-accent-red { background-color: #c0392b; }
        .bg-accent-purple { background-color: #9b59b6; }

        /* Status badges */
        .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; text-transform: uppercase; }
        .badge-running { background-color: rgba(26, 188, 156, 0.2); color: #1abc9c; }
        .badge-complete { background-color: rgba(46, 204, 113, 0.2); color: #2ecc71; }
        .badge-paused { background-color: rgba(241, 196, 15, 0.2); color: #f1c40f; }
        .badge-error { background-color: rgba(192, 57, 43, 0.2); color: #e74c3c; }
        .badge-created { background-color: rgba(155, 89, 182, 0.2); color: #9b59b6; }
        .badge-skip { background-color: rgba(136, 146, 164, 0.2); color: #8892a4; }

        /* Progress bar */
        .progress-bar { height: 4px; background-color: #2e2e50; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background-color: #1abc9c; transition: width 0.5s ease; }

        /* Step timeline */
        .step-dot { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; font-weight: 700; flex-shrink: 0; }
        .step-dot-pending { background-color: #2e2e50; color: #8892a4; }
        .step-dot-running { background-color: #1abc9c; color: #0f0f1a; animation: pulse 1.5s infinite; }
        .step-dot-complete { background-color: #2ecc71; color: #0f0f1a; }
        .step-dot-error { background-color: #e74c3c; color: white; }
        .step-dot-skipped { background-color: #3e3e60; color: #8892a4; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* Modal */
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); }

        /* HTMX loading indicator */
        .htmx-indicator { opacity: 0; transition: opacity 300ms; }
        .htmx-request .htmx-indicator, .htmx-request.htmx-indicator { opacity: 1; }

        /* Smooth transitions for HTMX swaps */
        .htmx-swapping { opacity: 0; transition: opacity 0.15s ease-out; }
        .htmx-settling { opacity: 1; transition: opacity 0.15s ease-in; }

        /* Tabs */
        .tab-active { border-bottom: 2px solid #1abc9c; color: #1abc9c; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #8892a4; }
        .tab-inactive:hover { color: #f0f0f4; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #2e2e50; border-radius: 3px; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="min-h-screen">
    <nav class="panel border-b border-gray-700 px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-6">
            <a href="/" class="text-xl font-bold accent-teal">MindArchive</a>
            <a href="/" class="{% if active_page == 'dashboard' %}text-white{% else %}text-muted{% endif %} hover:text-white transition-colors">Dashboard</a>
            <a href="/projects" class="{% if active_page == 'projects' %}text-white{% else %}text-muted{% endif %} hover:text-white transition-colors">Projects</a>
            <a href="/profiles" class="{% if active_page == 'profiles' %}text-white{% else %}text-muted{% endif %} hover:text-white transition-colors">Profiles</a>
            <a href="/formats" class="{% if active_page == 'formats' %}text-white{% else %}text-muted{% endif %} hover:text-white transition-colors">Formats</a>
            <a href="/costs" class="{% if active_page == 'costs' %}text-white{% else %}text-muted{% endif %} hover:text-white transition-colors">Costs</a>
        </div>
        <div class="flex items-center gap-4">
            <div id="sse-status" class="text-xs text-muted">
                <span class="inline-block w-2 h-2 rounded-full bg-gray-500 mr-1"></span>Offline
            </div>
            <span class="text-muted text-sm">v{{ version }}</span>
        </div>
    </nav>

    <!-- Toast container for SSE notifications -->
    <div id="toast-container" class="fixed top-16 right-4 z-50 space-y-2 w-80"></div>

    <main class="max-w-7xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- SSE connection for real-time updates -->
    <div hx-ext="sse" sse-connect="/api/events" sse-swap="message" hx-swap="none" style="display:none;">
        <div sse-swap="pipeline_event" hx-swap="none"></div>
    </div>

    <script>
        // SSE connection status
        document.body.addEventListener('htmx:sseOpen', function() {
            document.getElementById('sse-status').innerHTML =
                '<span class="inline-block w-2 h-2 rounded-full bg-green-500 mr-1"></span>Live';
        });
        document.body.addEventListener('htmx:sseClose', function() {
            document.getElementById('sse-status').innerHTML =
                '<span class="inline-block w-2 h-2 rounded-full bg-gray-500 mr-1"></span>Offline';
        });
        document.body.addEventListener('htmx:sseError', function() {
            document.getElementById('sse-status').innerHTML =
                '<span class="inline-block w-2 h-2 rounded-full bg-red-500 mr-1"></span>Error';
        });

        // Toast notification helper
        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const colors = {
                'success': 'border-green-500 bg-green-900/30',
                'error': 'border-red-500 bg-red-900/30',
                'info': 'border-teal-500 bg-teal-900/30',
                'warning': 'border-yellow-500 bg-yellow-900/30',
            };
            const toast = document.createElement('div');
            toast.className = `panel rounded-lg px-4 py-3 text-sm border-l-4 ${colors[type] || colors.info} transition-all`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 5000);
        }

        // Handle SSE pipeline events
        document.body.addEventListener('sse:message', function(e) {
            try {
                const data = JSON.parse(e.detail.data || '{}');
                if (data.event_type === 'step_complete') {
                    showToast(`Step ${data.step_number}: ${data.step_name} complete`, 'success');
                } else if (data.event_type === 'step_error') {
                    showToast(`Step ${data.step_number}: ${data.message}`, 'error');
                } else if (data.event_type === 'run_complete') {
                    showToast(data.message || 'Pipeline complete!', 'success');
                } else if (data.event_type === 'gate_pause') {
                    showToast(`Gate pause at step ${data.step_number}`, 'warning');
                }
                // Refresh dynamic content on events
                htmx.trigger('#stats-panel', 'refresh');
                htmx.trigger('#projects-list', 'refresh');
            } catch(err) {}
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
